<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>GLW - Active Online Subscriptions</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --obsidian-bg: #0a0a0a;
            --iron-surface: rgba(22, 20, 18, 0.95);
            --plate-surface: #141311;
            --gold-accent: #c5a059;
            --gold-bright: #f3e5ab;
            --gold-glow: rgba(197, 160, 89, 0.25);
            --border-muted: rgba(60, 55, 45, 0.6);
            --border-bright: rgba(197, 160, 89, 0.5);
            --text-main: #e8e6df;
            --text-muted: #9e9a8f;
            --snappy-timing: 0.15s cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }

        body {
            background: var(--obsidian-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            line-height: 1.6;
        }

        h2, h3 {
            font-family: 'Segoe UI', 'Trebuchet MS', Trajan, Georgia, serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold-bright);
            margin-top: 0;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
        }

        h2 {
            font-size: 1.45rem;
            border-bottom: 1px solid var(--border-muted);
            padding-bottom: 8px;
            margin-bottom: 16px;
            margin-top: 30px;
            text-align: center;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px 20px;
            width: 100%;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        strong {
            color: var(--text-main);
            font-weight: 700;
        }

        .card {
            background: var(--iron-surface);
            padding: 22px 26px;
            margin: 20px 0;
            border: 1px solid var(--border-muted);
            border-left: 3px solid var(--gold-accent);
            border-radius: 2px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8), inset 0 0 12px rgba(0, 0, 0, 0.6);
            transition: border-color var(--snappy-timing), box-shadow var(--snappy-timing);
        }
        .card:hover {
            border-color: var(--border-bright);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.9), 0 0 15px var(--gold-glow);
        }

        .card-basic    { border-left: 3px solid #379ad4; }
        .card-ultimate { border-left: 3px solid var(--gold-bright); }
        .card-creators { border-left: 3px solid #68ffb9; }

        .alert-icon {
            vertical-align: middle;
            width: 18px;
            height: 18px;
            margin-left: 5px;
            filter: drop-shadow(0 0 4px rgba(255,51,51,0.6));
        }

        body::-webkit-scrollbar {
            width: 12px;
            background: var(--obsidian-bg);
        }
        body::-webkit-scrollbar-thumb {
            background: #23201c;
            border: 1px solid var(--border-muted);
            border-radius: 1px;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: var(--border-muted);
            border-color: var(--gold-accent);
        }
        body::-webkit-scrollbar-track {
            background: var(--obsidian-bg);
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: #23201c var(--obsidian-bg);
        }

        @media (max-width: 1000px) {
            main {
                max-width: 96vw;
                padding-left: 3vw;
                padding-right: 3vw;
            }
            .card {
                padding: 18px 20px;
            }
        }
        @media (max-width: 600px) {
            main {
                max-width: 100vw;
                padding-left: 4vw;
                padding-right: 4vw;
            }
            .card {
                padding: 16px 14px;
                font-size: 0.95em;
            }
            body { font-size: 15px; }
        }
    </style>
    <script src="scripts/lock.js"></script>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="scripts/navbar.js"></script>

    <main>
        <h2>Active Subscriptions</h2>
        <p style="text-align: center;">Only a Funds Account Holder can update subscription status. This excludes Elders and Co-leaders from changing any roles.</p>
        <div style="display: flex; gap: 24px; justify-content: center; margin: 20px 0 32px 0;">
            <p data-emojis data-emoji-size="50px" style="margin: 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));">:online-basic:</p>
            <p data-emojis data-emoji-size="50px" style="margin: 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));">:online-ultimate:</p>
            <p data-emojis data-emoji-size="50px" style="margin: 0; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));">:online-creators:</p>
        </div>
        <div id="subscription-list"></div>
    </main>

    <script>
        function parseMDY(dateStr) {
            const parts = dateStr.split('/');
            if (parts.length !== 3) return null;
            const m = parseInt(parts[0], 10) - 1;
            const d = parseInt(parts[1], 10);
            const y = parseInt(parts[2], 10);
            if (isNaN(m) || isNaN(d) || isNaN(y)) return null;
            return new Date(y, m, d);
        }

        function isOlderThanOneMonth(dateStr) {
            const paidDate = parseMDY(dateStr);
            if (!paidDate) return false;
            const oneMonthAgo = new Date();
            oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);
            return paidDate < oneMonthAgo;
        }

        const SUBSCRIPTION_DATA = [
            { username: "ITZDRAKO", lastPaid: "7/12/2026", tier: "Ultimate", method: "Cash App", since: "7/12/2026", freeTrial: "Y" },
            { username: "MAYO", lastPaid: "7/7/2026", tier: "Ultimate", method: "Cash App", since: "7/7/2026", freeTrial: "N" },
            { username: "JAWS", lastPaid: "7/17/2026", tier: "Ultimate", method: "Cash App", since: "7/17/2026", freeTrial: "Y" }
        ];

        const TIER_CLASS = {
            Basic: "card-basic",
            Ultimate: "card-ultimate",
            Creators: "card-creators"
        };

        const listContainer = document.getElementById('subscription-list');

        SUBSCRIPTION_DATA.forEach(member => {
            const card = document.createElement('div');
            let className = 'card';
            if (TIER_CLASS[member.tier]) className += ' ' + TIER_CLASS[member.tier];
            card.className = className;
            
            let lastPaidHtml = `${member.lastPaid}`;
            if (isOlderThanOneMonth(member.lastPaid)) {
                lastPaidHtml += ` <img src="assets/notified.png" alt="Alert: Payment overdue" title="This subscription's last payment date is past due!" class="alert-icon">`;
            }

            card.innerHTML = `
                <h3 style="margin-bottom: 10px;">${member.username}</h3>
                <p style="margin-bottom: 6px;"><strong>Tier:</strong> ${member.tier}</p>
                <p style="margin-bottom: 6px;"><strong>Last Paid:</strong> ${lastPaidHtml} | <strong>Member Since:</strong> ${member.since}</p>
                <p style="margin-bottom: 6px;"><strong>Payment Method:</strong> ${member.method}</p>
                <p style="margin-bottom: 0;"><strong>Free Trial:</strong> ${member.freeTrial}</p>
            `;
            listContainer.appendChild(card);
        });
    </script>
    <script src="scripts/emojis.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLW - Giveaway Spinner</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-hover: #f1c40f;
            --bg-gradient: radial-gradient(circle at top right, #1b1b1b 0%, #000000 100%);
            --panel-bg: linear-gradient(to bottom, rgba(7, 7, 7, 0.92) 0%, rgba(0, 0, 0, 0.6) 100%);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8f8f2;
            --text-muted: #a0a0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scrollbar-width: thin;
            scrollbar-color: var(--gold) #111;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::-webkit-scrollbar {
            width: 12px;
            background: #111;
        }
        body::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 6px;
            border: 3px solid #111;
        }

        .header-section {
            text-align: center;
            margin-top: 80px;
            margin-bottom: 2rem;
            padding: 0 1rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 1px;
            line-height: 1.2;
            text-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            margin-bottom: 0.5rem;
        }

        .header-section .subtitle {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 1rem auto;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .header-section .stats {
            display: inline-block;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 4rem;
            width: 100%;
            max-width: 1100px;
            padding: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @media (max-width: 850px) {
            .container {
                flex-direction: column;
                gap: 3rem;
            }
        }

        .setup-panel {
            width: 100%;
            max-width: 400px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .setup-panel h3 {
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .textarea-container {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            padding: 1rem;
            resize: none;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
            background: rgba(0, 0, 0, 0.5);
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.8rem;
            text-align: right;
            font-weight: 300;
        }

        .wheel-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ticker {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #fff;
            z-index: 10;
            filter: drop-shadow(0px 6px 8px rgba(0,0,0,0.6));
        }

        .spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, var(--gold), #b89a2b);
            color: #111;
            border-radius: 50%;
            border: 4px solid #1a1a24;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            outline: none;
        }

        .spin-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: linear-gradient(135deg, var(--gold-hover), var(--gold));
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
        }

        .spin-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .spin-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: translate(-50%, -50%);
            box-shadow: none;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 0 12px rgba(255,255,255,0.03);
            background: #111;
            transition: filter 0.3s;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .winner-display {
            visibility: hidden;
            opacity: 0;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%) scale(0.8);
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid rgba(102, 55, 212, 0.3);
            padding: 3rem 4rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(97, 55, 212, 0.15);
            z-index: 200;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 350px;
        }

        .winner-display.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .winner-display h2 {
            font-size: 1rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .winner-name {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            word-break: break-word;
        }

        @media (max-width: 600px) {
            .winner-name {
                font-size: 2rem;
            }
        }

        .close-btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .close-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>

    <div class="header-section">
        <h1>Online Members<br>Giveaway Wheel</h1>
        <p class="subtitle">
            up to 10 names and spin the wheel for the monthly giveaways.<br>
            <em>Only a Funds Account Member can authorize this event.</em>
        </p>
        <div class="stats">
            Last Giveaway: <strong>None yet</strong> &nbsp;|&nbsp; Last Winner: <strong>None yet</strong>
        </div>
    </div>

    <div class="container">
        <div class="wheel-box">
            <div class="ticker"></div>
            <button class="spin-btn" id="spinBtn">Spin</button>
            <canvas id="wheelCanvas" width="450" height="450"></canvas>
        </div>

        <div class="setup-panel">
            <h3>Online Users <span class="hint" id="countHint">6 / 10</span></h3>
            <div class="textarea-container">
                <textarea id="namesInput" placeholder="Enter one name per line...">GRINDEROUZ&#10;WORKSPACE&#10;GRINDEROUZ&#10;WORKSPACE&#10;GRINDEROUZ&#10;WORKSPACE</textarea>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="winner-display" id="winnerDisplay">
        <h2>And the Winner Is...</h2>
        <div class="winner-name" id="winnerName">---</div>
        <button class="close-btn" onclick="closeWinner()">APPROVED</button>
    </div>

    <script src="scripts/navbar.js"></script>
    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        const countHint = document.getElementById('countHint');
        const spinBtn = document.getElementById('spinBtn');
        const winnerDisplay = document.getElementById('winnerDisplay');
        const winnerName = document.getElementById('winnerName');
        const overlay = document.getElementById('overlay');

        const colors = [
            '#e63946', '#f4a261', '#e9c46a', '#2a9d8f',
            '#264653', '#8338ec', '#3a86ff', '#ff006e',
            '#fb5607', '#ffbe0b'
        ];

        let names = [];
        let currentAngle = 0;
        let isSpinning = false;

        function updateNames() {
            let lines = namesInput.value.split('\n')
                .map(line => line.trim())
                .filter(line => line !== '');

            if (lines.length > 10) {
                lines = lines.slice(0, 10);
                namesInput.value = lines.join('\n');
            }

            names = lines;
            countHint.textContent = `${names.length} / 10`;
            drawWheel();
        }

        function drawWheel() {
            const numSegments = names.length;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX - 10;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fillStyle = '#1a1a24';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#333';
                ctx.stroke();
                return;
            }

            const arcSize = (2 * Math.PI) / numSegments;

            for (let i = 0; i < numSegments; i++) {
                const angle = currentAngle + (i * arcSize);
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Poppins, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillText(names[i], radius - 20, 6);
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.lineWidth = 8;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.stroke();
        }

        function spin() {
            if (isSpinning || names.length === 0) return;

            isSpinning = true;
            spinBtn.disabled = true;
            namesInput.disabled = true;

            const duration = 4000;
            const startTimestamp = performance.now();
            const startAngle = currentAngle % (2 * Math.PI);
            const totalRotation = (Math.PI * 2 * 25) + (Math.random() * Math.PI * 2);

            function animate(now) {
                const elapsed = now - startTimestamp;
                const progress = Math.min(elapsed / duration, 1);
                const easeOutCubic = 1 - Math.pow(1 - progress, 4);

                currentAngle = startAngle + (totalRotation * easeOutCubic);
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    finalizeWinner();
                }
            }

            requestAnimationFrame(animate);
        }

        function finalizeWinner() {
            isSpinning = false;
            spinBtn.disabled = false;
            namesInput.disabled = false;

            const numSegments = names.length;
            const arcSize = (2 * Math.PI) / numSegments;

            let normalizedAngle = currentAngle % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

            let targetAngle = (1.5 * Math.PI) - normalizedAngle;
            if (targetAngle < 0) targetAngle += 2 * Math.PI;

            const winnerIndex = Math.floor(targetAngle / arcSize) % numSegments;

            winnerName.textContent = names[winnerIndex];
            winnerDisplay.classList.add('show');
            overlay.classList.add('show');
        }

        function closeWinner() {
            winnerDisplay.classList.remove('show');
            overlay.classList.remove('show');
        }

        namesInput.addEventListener('input', updateNames);
        spinBtn.addEventListener('click', spin);

        updateNames();
    </script>
    <script src="scripts/lock.js"></script>
    <script type="module" src="scripts/wheel-spinner/sfx.js"></script>
</body>
</html>

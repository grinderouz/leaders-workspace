<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GLW - Management</title>
    <link rel="icon" type="image/png" href="assets/navicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }
        a {
            color: #ffa500;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: #fff;
        }
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
            width: 100%;
            box-sizing: border-box;
        }
        section {
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        .card {
            background: #2a2a2a;
            padding: 18px 22px;
            margin: 20px 0;
            border-left: 5px solid #d4af37;
            border-radius: 6px;
            box-sizing: border-box;
        }
        details {
            background: #2a2a2a;
            padding: 13px 18px;
            margin: 16px 0;
            border-radius: 6px;
            box-sizing: border-box;
            cursor: pointer;
        }
        @media (max-width: 1000px) {
            main,
            section {
                max-width: 98vw;
                padding-left: 2vw;
                padding-right: 2vw;
            }
            .card,
            details {
                padding-left: 4vw;
                padding-right: 4vw;
            }
        }
        @media (max-width: 600px) {
            main,
            section {
                max-width: 100vw;
                padding-left: 2vw;
                padding-right: 2vw;
            }
            .card,
            details {
                padding: 10px 8px;
                font-size: 0.96em;
            }
            body {
                font-size: 15px;
            }
        }
        @media (max-width: 400px) {
            .card,
            details {
                padding: 7px 2px;
                font-size: 0.91em;
            }
        }
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
        }
        body::-webkit-scrollbar {
            width: 14px;
            background: #191919;
        }
        body::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 7px;
            border: 3px solid #191919;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #b89a2b;
        }
        body::-webkit-scrollbar-track {
            background: #191919;
            border-radius: 8px;
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: #d4af37 #191919;
        }
        .iframe-container {
            width: 100vw;
            margin: 0 calc(-50vw + 50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .iframe-title {
            text-align: center;
            width: 100%;
            font-size: 1.5em;
            font-weight: bold;
            color: #ffffff;
            margin: 18px 0 0 0;
            letter-spacing: 0.02em;
        }
        .iframe-newtab-btn {
            display: inline-block;
            margin-top: 6px;
            margin-bottom: 2px;
            margin-left: auto;
            margin-right: auto;
            border: 2px solid black;
            background: #222;
            color: #ffffff;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.18s, color 0.18s;
            padding: 6px 18px;
            box-shadow: 0 2px 7px rgba(0,0,0,0.08);
            text-decoration: none;
        }
        .iframe-newtab-btn:hover, .iframe-newtab-btn:focus {
            background: #000000;
            color: white;
            box-shadow: 0 20px 20px rgba(255, 255, 255, 0.08);
            border: 2px solid white;
            text-decoration: none;
        }
        .iframe-container iframe {
            width: 96vw;
            min-width: 320px;
            max-width: 1350px;
            border: none;
            height: 500px;
            min-height: 320px;
            max-height: 80vh;
            background: white;
            margin: 18px 0 6px 0;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .db-divider {
            border: none;
            border-top: 2px solid #646464;
            opacity: 0.7;
            margin: 36px auto 28px auto;
            width: 60%;
            max-width: 410px;
            box-shadow: 0 1px 8px rgba(212,175,55,0.05);
        }
        @media (max-width: 800px) {
            .iframe-container iframe {
                width: 99vw;
                min-width: 0;
                max-width: 100vw;
                height: 340px;
            }
            .iframe-title {
                font-size: 1.1em;
                margin-top: 10px;
            }
            .db-divider {
                margin: 22px auto 18px auto;
                width: 80%;
                max-width: 220px;
            }
        }
    </style>
    <script src="scripts/embed-lock.js"></script>
    <script src="scripts/lock.js"></script>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="scripts/navbar.js"></script>

    <main>
        <section id="database">
            <div class="iframe-container">
                <hr class="db-divider" aria-hidden="true">
                <div class="iframe-title">CoLeader Applications</div>
                <a class="iframe-newtab-btn" href="https://docs.google.com/spreadsheets/d/1bLMdl_FM_KrfDYL-MGSBeXr_DFhuOaEGoMbf2tiDJGU/edit?usp=sharing" target="_blank" rel="noopener noreferrer">OPEN EXTERNALLY</a>
                <iframe src="https://docs.google.com/spreadsheets/d/1bLMdl_FM_KrfDYL-MGSBeXr_DFhuOaEGoMbf2tiDJGU/edit?usp=sharing" allowfullscreen></iframe>
            </div>
            <div class="iframe-container">
                <div class="iframe-title">Elder Applications</div>
                <a class="iframe-newtab-btn" href="https://docs.google.com/spreadsheets/d/1Z1bDP9UrvZSvEJd6ULazZ3zBGX1c641Zgr3ItyUvhkk/edit?usp=sharing" target="_blank" rel="noopener noreferrer">OPEN EXTERNALLY</a>
                <iframe src="https://docs.google.com/spreadsheets/d/1Z1bDP9UrvZSvEJd6ULazZ3zBGX1c641Zgr3ItyUvhkk/edit?usp=sharing" allowfullscreen></iframe>
            </div>
            <hr class="db-divider" aria-hidden="true">
            <div class="iframe-container">
                <div class="iframe-title">Strike System</div>
                <a class="iframe-newtab-btn" href="https://docs.google.com/forms/d/e/1FAIpQLScLj5_UAiDioR78MeHNSNpJnqDNzsov9NSnqm_3IFxnEgyKKA/viewform" target="_blank" rel="noopener noreferrer">OPEN EXTERNALLY</a>
                <iframe 
                    src="https://docs.google.com/forms/d/e/1FAIpQLScLj5_UAiDioR78MeHNSNpJnqDNzsov9NSnqm_3IFxnEgyKKA/viewform" 
                    allowfullscreen style="height: 680px;"></iframe>
            </div>
            <div class="iframe-container">
                <div class="iframe-title">Active Reports</div>
                <a class="iframe-newtab-btn" href="https://docs.google.com/spreadsheets/d/1l7Udpg1nJXm00pEJkGKEmJwgq7f1aSMea9SYGi9Dqak/edit?usp=sharing" target="_blank" rel="noopener noreferrer">OPEN EXTERNALLY</a>
                <iframe src="https://docs.google.com/spreadsheets/d/1l7Udpg1nJXm00pEJkGKEmJwgq7f1aSMea9SYGi9Dqak/edit?usp=sharing" allowfullscreen style="height: 680px;"></iframe>
            </div>
            <div class="iframe-container">
                <div class="iframe-title">Official Website</div>
                <a class="iframe-newtab-btn" href="https://grinderouz.github.io/clan/" target="_blank" rel="noopener noreferrer">OPEN EXTERNALLY</a>
                <iframe src="https://grinderouz.github.io/clan/" allowfullscreen style="height: 680px;"></iframe>
            </div>
        </section>
    </main>
    <script>
      window.addEventListener("DOMContentLoaded", function() {
        const LEADER_PIN = "1738";
        const coleadIframe = document.querySelector('.iframe-container:nth-of-type(1) iframe');
        if (coleadIframe) {
          EmbedLock.lockIframeContainer(coleadIframe.parentElement, LEADER_PIN);
        }
        const elderIframe = document.querySelector('.iframe-container:nth-of-type(2) iframe');
        if (elderIframe) {
          EmbedLock.lockIframeContainer(elderIframe.parentElement, LEADER_PIN);
        }
      });
    </script>

<script src="scripts/gpr.js"></script>
</body>
</html>

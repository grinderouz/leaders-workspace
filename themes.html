<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grinderouz Leaders Workspace - Themes</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="theme-color" content="#d4af37">
    <link rel="icon" type="image/png" href="assets/navicon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="scripts/theme.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background: #191919;
            color: #fff;
            margin: 0;
            min-height: 100vh;
            max-width: 100vw;
            overflow-x: hidden;
            padding: 0;
            padding-top: 0 !important;
        }
        body::-webkit-scrollbar {
            width: 14px;
            background: #191919;
        }
        body::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 7px;
            border: 3px solid #191919;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #b89a2b;
        }
        body::-webkit-scrollbar-track {
            background: #191919;
            border-radius: 8px;
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: #d4af37 #191919;
        }
        *, *::before, *::after {
            box-sizing: border-box;
        }
        #navbar-container {
            all: unset;
            display: block;
            width: 100%;
            position: sticky !important;
            top: 0;
            z-index: 1100;
            background: #1a1a1a;
        }
        .container {
            max-width: 520px;
            margin: 40px auto 48px auto;
            background: #232323;
            border-radius: 13px;
            box-shadow: 0 4px 32px #000c;
            padding: 38px 28px 32px 28px;
        }
        main {
            width: 100%;
        }
        h1 {
            color: #d4af37;
            font-size: 1.35em;
            margin: 0 0 10px 0;
            text-align: center;
        }
        .desc {
            color: #ffe4a4cc;
            text-align: center;
            line-height: 1.6;
            font-size: 1.02em;
            margin-bottom: 28px;
        }
        .theme-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        .theme-card {
            display: block;
            width: 100%;
            padding: 14px 16px;
            background: #2e2e2e;
            border: 2px solid #3a3a3a;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: inherit;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .theme-card:hover {
            transform: translateY(-1px);
        }
        .theme-card:focus-visible {
            outline: 2px solid #d4af37;
            outline-offset: 2px;
        }
        .theme-card.is-active {
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
        }
        .theme-card-name {
            font-size: 1.08em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .theme-card-desc {
            font-size: 0.92em;
            color: #ccc;
            line-height: 1.45;
        }
        .theme-card-badge {
            font-size: 0.72em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 2px 8px;
            border-radius: 999px;
            background: #d4af37;
            color: #1a1a1a;
        }
        .theme-status {
            margin-top: 22px;
            text-align: center;
            color: #ffd700;
            font-size: 0.97em;
            min-height: 24px;
        }
    </style>
    <script src="lock.js"></script>
    <script src="ProfilePanel.js"></script>
</head>
<body>
    <div id="navbar-container"></div>
    <script src="navbar.js"></script>
    <main>
        <div class="container">
            <h1>Choose Your App Theme</h1>
            <p class="desc">
                Pick a look for the whole workspace.
            </p>
            <div class="theme-grid" id="themeGrid" role="listbox" aria-label="Workspace themes"></div>
            <div class="theme-status" id="themeStatus" aria-live="polite"></div>
        </div>
    </main>
    <script>
        (function () {
            var grid = document.getElementById("themeGrid");
            var status = document.getElementById("themeStatus");
            if (!grid || !window.GLWTheme) return;

            function render() {
                var activeId = window.GLWTheme.getId();
                grid.innerHTML = "";
                window.GLWTheme.themes.forEach(function (theme) {
                    var card = document.createElement("button");
                    card.type = "button";
                    card.className = "theme-card" + (theme.id === activeId ? " is-active" : "");
                    card.setAttribute("role", "option");
                    card.setAttribute("aria-selected", theme.id === activeId ? "true" : "false");
                    card.dataset.themeId = theme.id;

                    var nameRow = document.createElement("div");
                    nameRow.className = "theme-card-name";
                    nameRow.textContent = theme.name;
                    if (theme.id === activeId) {
                        var badge = document.createElement("span");
                        badge.className = "theme-card-badge";
                        badge.textContent = "Active";
                        nameRow.appendChild(badge);
                    }
                    var desc = document.createElement("p");
                    desc.className = "theme-card-desc";
                    desc.textContent = theme.description;
                    card.appendChild(nameRow);
                    card.appendChild(desc);

                    card.addEventListener("click", function () {
                        window.GLWTheme.setTheme(theme.id);
                        status.textContent = theme.name + " is now active across all pages.";
                        render();
                    });

                    grid.appendChild(card);
                });
            }

            window.addEventListener("glw-theme-change", render);
            render();
        })();
    </script>
</body>
</html>

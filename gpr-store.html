<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GLW - GPoints Store</title>
    <link rel="icon" type="image/png" href="assets/navicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            min-height: 100vh;
            overflow-x: hidden;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            width: 100%;
            padding: 20px 16px;
            margin: 0;
        }

        .card-wrapper {
            width: 100%;
            max-width: 440px;
            margin: 10px auto 28px auto;
            perspective: 1000px;
        }
        .card {
            background: linear-gradient(135deg, #1e1e1e 0%, #0d0d0d 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.12);
            width: 100%;
            padding: 26px 28px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 235px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.18);
        }
        body::-webkit-scrollbar {
            width: 14px;
            background: #191919;
        }
        body::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 7px;
            border: 3px solid #191919;
        }
        body::-webkit-scrollbar-thumb:hover {
            background: #b89a2b;
        }
        body::-webkit-scrollbar-track {
            background: #191919;
            border-radius: 8px;
        }
        html {
            scrollbar-width: thin;
            scrollbar-color: #d4af37 #191919;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }
        .card-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-pill {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.72em;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffd54f;
        }
        .brand-title {
            font-size: 0.9em;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #a0a0a0;
            text-transform: uppercase;
        }
        .card-status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.78em;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #5bff1b;
            border-radius: 50%;
            box-shadow: 0 0 8px #5bff1b;
        }

        .card-middle {
            margin: 22px 0;
            z-index: 2;
        }
        .balance-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #777;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .points-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            margin: 0;
        }
        .points-display {
            font-size: 3.2em;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
        }
        .gpoint-icon {
            height: 42px;
            width: 42px;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
            filter: drop-shadow(0px 4px 12px rgba(255, 255, 255, 0.3));
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 2;
        }
        .smart-chip {
            width: 42px;
            height: 30px;
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            border-radius: 6px;
            position: relative;
            opacity: 0.85;
            border: 1px solid #ffe082;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3);
        }
        .smart-chip::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(0,0,0,0.3);
        }
        .card-detail {
            text-align: right;
        }
        .detail-label {
            display: block;
            font-size: 0.68em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2px;
        }
        .detail-value {
            font-size: 0.95em;
            font-weight: 700;
            color: #dedede;
            letter-spacing: 0.05em;
        }

        .shop-container {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 36px 20px;
            width: 100%;
            max-width: 1200px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .shop-header {
            text-align: center;
            color: #fff;
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 34px;
            margin-top: 0;
            letter-spacing: -0.01em;
        }
        .giftcards-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            justify-content: center;
            width: 100%;
            max-width: 1050px;
            margin: 0;
        }
        .giftcard {
            background: linear-gradient(145deg, #222 0%, #171717 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 28px 22px 22px 22px;
            width: 100%;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            box-sizing: border-box;
        }
        .giftcard:hover:not([disabled]) {
            transform: translateY(-4px);
            border-color: rgba(212, 175, 55, 0.4);
        }
        .giftcard[disabled], .giftcard.disabled {
            opacity: 0.55;
            filter: grayscale(0.6);
            pointer-events: none;
        }
        .giftcard-logo {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            margin-bottom: 18px;
            object-fit: contain;
            background: #fff;
            box-shadow: 0 4px 14px rgba(0,0,0,0.3);
            padding: 6px;
        }
        .giftcard-title {
            font-size: 1.15em;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: #fff;
            letter-spacing: 0.01em;
            text-align: center;
        }
        .giftcard-points {
            font-size: 0.95em;
            margin: 0 0 20px 0;
            color: #ffd54f;
            font-weight: 600;
        }
        .redeem-btn {
            background: linear-gradient(90deg, #d4af37 0%, #ffb300 100%);
            color: #121212;
            font-size: 1em;
            font-weight: 700;
            padding: 12px 0;
            border-radius: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
            margin-top: auto;
            box-shadow: 0 4px 12px rgba(255, 179, 0, 0.25);
            transition: opacity 0.2s, transform 0.1s;
        }
        .redeem-btn:hover:not(:disabled) {
            opacity: 0.95;
        }
        .redeem-btn:disabled {
            cursor: not-allowed;
            background: #2a2a2a;
            color: #666;
            box-shadow: none;
        }
        .shop-info {
            text-align: center;
            font-size: 0.95em;
            color: #aaa;
            margin: 36px auto 10px auto;
            max-width: 900px;
        }
        #shop-message {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        .shop-success, .shop-error {
            padding: 20px 24px;
            border-radius: 12px;
            text-align: center;
            margin: 20px auto 0 auto;
            font-size: 1.05em;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .shop-success {
            background: rgba(212, 175, 55, 0.1);
            color: #ffe082;
            border: 1px solid #d4af37;
        }
        .shop-error {
            background: rgba(211, 47, 47, 0.1);
            color: #ffc4c4;
            border: 1px solid #d32f2f;
        }
        .cancel-proof-btn {
            background: #d32f2f;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 18px;
            transition: background 0.2s;
        }
        .cancel-proof-btn:hover {
            background: #b71c1c;
        }
        .cancel-warning {
            font-size: 0.8em;
            color: #ff8a80;
            margin-top: 8px;
        }

        @media (max-width: 900px) {
            .giftcards-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .giftcards-row {
                grid-template-columns: 1fr;
            }
            .points-display {
                font-size: 2.6em;
            }
            .gpoint-icon {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <main>
        <div class="card-wrapper">
            <div class="card">
                <div class="card-top">
                    <div class="card-brand">
                        <span class="brand-pill">GLW</span>
                        <span class="brand-title">GPoints Card</span>
                    </div>
                    <div class="card-status-badge">
                        <span class="status-dot"></span>
                        <span id="rewards-status" style="color:#5bff1b; font-weight:bold;">Active</span>
                    </div>
                </div>

                <div class="card-middle">
                    <div class="balance-label">Available Balance</div>
                    <div class="points-container">
                        <div class="points-display" id="current-points">0</div>
                        <img src="assets/gpr/gpoint.png" alt="GPoint Icon" class="gpoint-icon">
                    </div>
                </div>

                <div class="card-bottom">
                    <div class="smart-chip"></div>
                    <div class="card-detail">
                        <span class="detail-label">Max Limit</span>
                        <span class="detail-value">50,000 GP</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="shop-container">
            <h3 class="shop-header">Gift Card Shop</h3>
            <div class="giftcards-row">
                <div class="giftcard" id="apple-card">
                    <img src="assets/gpr/apple-ico.png" class="giftcard-logo" alt="Apple Logo">
                    <div class="giftcard-title">$10 Apple Gift Card</div>
                    <div class="giftcard-points">20,000 GPoints</div>
                    <button class="redeem-btn" id="redeem-apple">Redeem Card</button>
                </div>
                <div class="giftcard" id="google-card">
                    <img src="assets/gpr/google-play-ico.png" class="giftcard-logo" alt="Google Play Logo">
                    <div class="giftcard-title">$10 Google Play Gift Card</div>
                    <div class="giftcard-points">20,000 GPoints</div>
                    <button class="redeem-btn" id="redeem-google">Redeem Card</button>
                </div>
                <div class="giftcard" id="custom-cosmetic-card">
                    <img src="assets/gpr/mystery.jpg" class="giftcard-logo" alt="Custom Cosmetic Icon">
                    <div class="giftcard-title">Custom Cosmetic Gift Link (Under $10)</div>
                    <div class="giftcard-points">20,000 GPoints</div>
                    <button class="redeem-btn" id="redeem-custom-cosmetic">Redeem Card</button>
                </div>
            </div>

            <div id="device-type-display" style="text-align:center;margin:16px 0 10px 0;font-size:0.9em;color:#ffa726;font-weight:600;"></div>

            <div id="shop-message"></div>
            
            <div class="shop-info" id="shop-info">
                <span style="display:block; margin-top:6px; color:#777">(Payouts can only be received through a Gift Card Code)</span>
                <a style="color:#dedede; text-decoration: underline; margin-top: 6px; display: inline-block;" target="_blank" href="assets/gpr/tos.html">Learn More About GPoints</a>
            </div>
        </div>
    </main>
    <script src="scripts/navbar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const displayElement = document.getElementById('current-points');
            const shopMsgElem = document.getElementById('shop-message');
            const REDEEM_COST = 20000;
            let isRedeeming = false;

            const SHOP_REDEEMED_KEY = 'glw_shop_redeemed_state_v1';

            function onGprReady(callback) {
                if (typeof window.REWARDS_SYSTEM_ENABLED !== "undefined") {
                    callback();
                } else {
                    let checks = 0;
                    const interval = setInterval(() => {
                        if (typeof window.REWARDS_SYSTEM_ENABLED !== "undefined") {
                            clearInterval(interval);
                            callback();
                        } else if (++checks > 30) {
                            clearInterval(interval);
                            callback();
                        }
                    }, 50);
                }
            }

            function getRedeemedState() {
                const state = localStorage.getItem(SHOP_REDEEMED_KEY);
                if (!state) return null;
                try {
                    return JSON.parse(state);
                } catch { return null; }
            }
            function setRedeemedState(val) {
                if (!val) {
                    localStorage.removeItem(SHOP_REDEEMED_KEY);
                } else {
                    localStorage.setItem(SHOP_REDEEMED_KEY, JSON.stringify(val));
                }
            }

            function getPoints() {
                return parseInt(localStorage.getItem('glw_gpoints')) || 0;
            }

            function setPoints(val) {
                localStorage.setItem('glw_gpoints', val);
                window.dispatchEvent(new CustomEvent('gpointsUpdated', { detail: val }));
            }

            function updateDisplay(points) {
                const isRewardsOffline = (typeof window.REWARDS_SYSTEM_ENABLED !== "undefined") && !window.REWARDS_SYSTEM_ENABLED;
                displayElement.innerText = points;
                const disabled = isRedeeming 
                    || (typeof points === 'number' && points < REDEEM_COST) 
                    || isRewardsOffline;
                document.getElementById("redeem-apple").disabled = disabled;
                document.getElementById("redeem-google").disabled = disabled;
                document.getElementById("redeem-custom-cosmetic").disabled = disabled;
                document.getElementById("apple-card").classList.toggle('disabled', disabled);
                document.getElementById("google-card").classList.toggle('disabled', disabled);
                document.getElementById("custom-cosmetic-card").classList.toggle('disabled', disabled);

                if (isRewardsOffline) {
                    showOfflineMsg();
                } else if (!isRedeeming) {
                    shopMsgElem.innerHTML = "";
                }
            }

            function getDeviceTypeText() {
                let host = window.location.hostname;
                let protocol = window.location.protocol;
                if (protocol === 'file:') {
                    return 'Device Type: Running Local (Offline)';
                }
                if (host === 'localhost' || host === '127.0.0.1' || host.startsWith('192.168.') || host.endsWith('.local')) {
                    return 'Device Type: Running Local (Online)';
                }
                return 'Device Type: HTML Host (' + host + ')';
            }

            function showShopMsg(msg, type, timestamp) {
                isRedeeming = true;
                updateDisplay(getPoints());
                let dateHtml = '';
                if (timestamp) {
                    const dt = new Date(timestamp);
                    dateHtml = `<div style="margin-top:12px;font-size:0.95em;color:#ffecb3;font-weight:500;">Redemption Date: ${dt.toLocaleString()}</div>`;
                }
                let deviceTypeHtml = `<div style="margin-top:6px;font-size:0.9em;color:#ffb74d;">${getDeviceTypeText()}</div>`;
                let innerHTML = `<div class="shop-success">
                                    <span>${msg}</span>
                                    ${dateHtml}
                                    ${deviceTypeHtml}
                                    <button class="cancel-proof-btn" id="close-proof-btn">Close & Remove Proof</button>
                                    <div class="cancel-warning">Warning: This cannot be undone and GPoints are not refunded.</div>
                                </div>`;
                shopMsgElem.innerHTML = innerHTML;
                document.getElementById('close-proof-btn').addEventListener('click', () => {
                    closeRedemption();
                });
            }

            function showOfflineMsg() {
                isRedeeming = false;
                shopMsgElem.innerHTML = `<div class="shop-error"><span>Redeeming is currently disabled while the rewards system is offline. Please try again later.</span></div>`;
            }

            function showErrorMsg(msg) {
                isRedeeming = false;
                updateDisplay(getPoints());
                shopMsgElem.innerHTML = `<div class="shop-error"><span>${msg}</span></div>`;
                setTimeout(() => {
                    if (!(typeof window.REWARDS_SYSTEM_ENABLED !== "undefined" && !window.REWARDS_SYSTEM_ENABLED)) {
                        shopMsgElem.innerHTML = "";
                    }
                }, 4000);
            }

            function closeRedemption() {
                shopMsgElem.innerHTML = '';
                setRedeemedState(null);
                isRedeeming = false;
                updateDisplay(getPoints());
            }

            function getSupportMsg(type) {
                if (type === "apple") {
                    return `CONGRATULATIONS! YOU REDEEMED A <b>$10 APPLE GIFT CARD</b>.<br><br>To complete your request, please message <b>youngdollazz1700</b> on Discord or Ping me in the discord with a screenshot of this screen with this messages. Your username and balance will be verified and fulfilled within 2 weeks depending on Grinderouz Economy :( <br><br> Do not cancel this unless you are wanting a different card.`;
                } else if (type === "google") {
                    return `CONGRATULATIONS! YOU REDEEMED A <b>$10 GOOGLE PLAY GIFT CARD</b>.<br><br>To complete your request, please message <b>youngdollazz1700</b> on Discord or Ping me in the discord with a screenshot of this screen with this messages. Your username and balance will be verified and fulfilled within 2 weeks depending on Grinderouz Economy :( <br><br> Do not cancel this unless you are wanting a different card.`;
                } else if (type === "custom-cosmetic") {
                    return `CONGRATULATIONS! YOU REDEEMED A <b>CUSTOM COSMETIC GIFT LINK (UNDER $10)</b>.<br><br>Please message <b>youngdollazz1700</b> on Discord and send a screenshot of this screen with your desired cosmetic (under $10) from a valid vendor. Your username and balance will be verified. Delivery/fulfillment may take up to 2 weeks depending on Grinderouz Economy. <br><br> Do not cancel this unless you want to redeem something else instead.`;
                }
                return "";
            }

            function replayRedeemedProofIfSet() {
                const state = getRedeemedState();
                if (state && state.active && state.type) {
                    isRedeeming = true;
                    showShopMsg(getSupportMsg(state.type), state.type, state.timestamp);
                } else {
                    isRedeeming = false;
                }
            }

            onGprReady(() => {
                replayRedeemedProofIfSet();

                updateDisplay(getPoints());
                window.addEventListener('gpointsUpdated', (event) => {
                    updateDisplay(event.detail);
                });

                function handleRedeem(type) {
                    if (typeof window.REWARDS_SYSTEM_ENABLED !== "undefined" && !window.REWARDS_SYSTEM_ENABLED) {
                        showOfflineMsg();
                        return;
                    }
                    if (isRedeeming) return;
                    const points = getPoints();
                    if (points < REDEEM_COST) {
                        showErrorMsg(`Not enough GPoints to redeem this card.`);
                        return;
                    }
                    const now = Date.now();
                    setPoints(points - REDEEM_COST);
                    setRedeemedState({
                        active: true,
                        type: type,
                        timestamp: now
                    });
                    showShopMsg(getSupportMsg(type), type, now);
                }

                document.getElementById('redeem-apple').addEventListener('click', () => handleRedeem('apple'));
                document.getElementById('redeem-google').addEventListener('click', () => handleRedeem('google'));
                document.getElementById('redeem-custom-cosmetic').addEventListener('click', () => handleRedeem('custom-cosmetic'));

                setInterval(() => {
                    updateDisplay(getPoints());
                }, 1000);
            });
        });
    </script>
    <script src="scripts/gpr.js"></script>
    <script src="assets/gpr/tos.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const statusElem = document.getElementById('rewards-status');
            if (statusElem && window.REWARDS_SYSTEM_ENABLED !== undefined) {
                if (window.REWARDS_SYSTEM_ENABLED) {
                    statusElem.textContent = 'Active';
                    statusElem.style.color = '#5bff1b';
                } else {
                    statusElem.textContent = 'Offline';
                    statusElem.style.color = '#ff5555';
                }
            }
        });
    </script>
</body>
</html>
